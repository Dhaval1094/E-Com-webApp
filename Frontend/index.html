<!DOCTYPE html>
<html>

<head>
  <title>Example E-commerce Platform</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <div id="loader" class="loader"></div>
    <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png" class="app-logo" alt="App Logo">

    <h2 class="app-title">
      Example E-commerce Platform
    </h2>

    <form id="loginForm">

      <input type="email" id="loginEmail" placeholder="Enter your email">

      <input type="password" id="loginPassword" placeholder="Enter your password">

      <button type="submit">
        Login
      </button>

      <div id="loader" class="loader"></div>

    </form>

    <p id="loginResult"></p>

    <div class="bottom-text">

      <p>
        New user?
        <a href="signup.html">
          Create an account
        </a>
      </p>

    </div>

  </div>

  <script type="module" src="login.js"></script>

</body>

</html>
