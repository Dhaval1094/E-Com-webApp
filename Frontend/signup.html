<!DOCTYPE html>
<html>

<head>
  <title>Create Account</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <img
      src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png"
      class="app-logo"
      alt="App Logo"
    >

    <h2 class="app-title">
      Create Your Account
    </h2>

    <form id="signupForm">

      <input
        type="text"
        id="name"
        placeholder="Enter your name"
      >

      <input
        type="email"
        id="email"
        placeholder="Enter your email"
      >

      <input
        type="password"
        id="password"
        placeholder="Create password"
      >

      <button type="submit">
        Signup
      </button>

    </form>

    <p id="result"></p>

    <div class="bottom-text">

      <p>
        Already have an account?
        <a href="index.html">
          Login here
        </a>
      </p>

    </div>

  </div>

  <script
    type="module"
    src="script.js"
  ></script>

</body>

</html>
