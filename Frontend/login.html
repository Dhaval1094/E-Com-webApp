<!DOCTYPE html>
<html>

<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>Login</h1>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button type="submit">
        Login
      </button>
    </form>
    <p id="loginResult"></p>
  </div>
  <script type="module" src="login.js"></script>
</body>

</html>
